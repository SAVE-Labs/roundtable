<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roundtable WebRTC Test Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .video-box {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 4px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        .status {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background: #333;
        }
        .status.connected {
            background: #2d5016;
        }
        .status.error {
            background: #5c1a1a;
        }
        h3 {
            margin-top: 0;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <h1>🎯 Roundtable WebRTC Audio Echo Test</h1>

    <div class="status" id="status">
        Status: Not connected
    </div>

    <div class="controls">
        <button id="startBtn" onclick="start()">Start Audio Echo</button>
        <button id="stopBtn" onclick="stop()" disabled>Stop</button>
        <p style="color: #888;">Note: Speak into your microphone - you should hear yourself echoed back!</p>
    </div>

    <div class="container">
        <div class="video-box">
            <h3>🎤 Your Audio (Local - Muted)</h3>
            <video id="localVideo" autoplay muted playsinline></video>
            <p style="color: #666; font-size: 14px;">Local audio is muted to prevent feedback</p>
        </div>
        <div class="video-box">
            <h3>🔊 Echo from Server (Remote)</h3>
            <video id="remoteVideo" autoplay playsinline></video>
            <p style="color: #666; font-size: 14px;">You should hear your voice echoed back here!</p>
        </div>
    </div>

    <script>
        const wsUrl = 'ws://localhost:1323/ws';
        let pc = null;
        let ws = null;
        let localStream = null;

        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');

        function updateStatus(message, type = 'info') {
            statusDiv.textContent = `Status: ${message}`;
            statusDiv.className = `status ${type}`;
        }

        async function start() {
            try {
                // Step 1: Request permissions explicitly first
                updateStatus('Checking microphone permissions...');

                try {
                    // Try to get a stream just to trigger permission prompt
                    const tempStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    console.log('Permission granted, devices:', tempStream.getTracks());
                    // Stop the temp stream immediately
                    tempStream.getTracks().forEach(track => track.stop());
                } catch (permErr) {
                    console.error('Permission request failed:', permErr);
                    throw permErr;
                }

                // Step 2: Now that we have permission, get the actual stream
                updateStatus('Opening microphone...');
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                });

                localVideo.srcObject = localStream;
                console.log('Audio stream obtained:', localStream.getTracks());
                updateStatus('Microphone accessed, creating peer connection...');

                // Create peer connection
                pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' }
                    ]
                });

                // Add local stream tracks to peer connection
                localStream.getTracks().forEach(track => {
                    pc.addTrack(track, localStream);
                });

                // Handle incoming tracks from server (the echo)
                pc.ontrack = (event) => {
                    console.log('Received remote track:', event.track.kind);
                    remoteVideo.srcObject = event.streams[0];
                    updateStatus('Connected! Receiving echo from server', 'connected');
                };

                // Handle connection state changes
                pc.onconnectionstatechange = () => {
                    console.log('Connection state:', pc.connectionState);
                    if (pc.connectionState === 'failed') {
                        updateStatus('Connection failed', 'error');
                    }
                };

                // Handle ICE connection state
                pc.oniceconnectionstatechange = () => {
                    console.log('ICE connection state:', pc.iceConnectionState);
                };

                // Connect to WebSocket
                updateStatus('Connecting to WebSocket...');
                ws = new WebSocket(wsUrl);

                ws.onopen = async () => {
                    updateStatus('Creating offer...');
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);

                    updateStatus('Sending offer to server...');
                    ws.send(JSON.stringify(pc.localDescription));
                };

                ws.onmessage = async (event) => {
                    const answer = JSON.parse(event.data);
                    console.log('Received answer from server:', answer);

                    if (answer.error) {
                        throw new Error(answer.error);
                    }

                    try {
                        await pc.setRemoteDescription(new RTCSessionDescription(answer));
                        updateStatus('Connecting to server...');
                    } catch (sdpError) {
                        console.error('Failed to set remote description:', sdpError);
                        throw sdpError;
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('WebSocket error', 'error');
                };

                ws.onclose = () => {
                    console.log('WebSocket closed');
                };

                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (error) {
                console.error('Error:', error);
                let errorMsg = error.message;

                // Provide helpful error messages
                if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
                    errorMsg = 'No camera found. Please connect a webcam and refresh the page.';
                } else if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    errorMsg = 'Camera permission denied. Click the 🔒 icon in the address bar and allow camera access.';
                } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
                    errorMsg = 'Camera is in use by another application. Please close it and try again.';
                }

                updateStatus(`Error: ${errorMsg}`, 'error');
                stop();
            }
        }

        function stop() {
            if (ws) {
                ws.close();
                ws = null;
            }

            if (pc) {
                pc.close();
                pc = null;
            }

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            localVideo.srcObject = null;
            remoteVideo.srcObject = null;

            updateStatus('Stopped');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', stop);
    </script>
</body>
</html>
