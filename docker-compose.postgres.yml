services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: roundtable
      POSTGRES_USER: roundtable
      POSTGRES_PASSWORD: roundtable
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roundtable"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    environment:
      DATABASE_URL: postgres://roundtable:roundtable@postgres:5432/roundtable?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
