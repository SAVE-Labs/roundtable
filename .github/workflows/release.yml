name: Release

on:
  push:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install opus
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libopusfile-dev libasound2-dev

      - name: Cache libdf.a
        id: cache-libdf
        uses: actions/cache@v4
        with:
          path: tui/internal/libdf.a
          key: libdf-linux-${{ hashFiles('tui/build_deepfilter.sh') }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.cache-libdf.outputs.cache-hit != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        with:
          workspaces: tui/deep-filter-net/libDF -> target

      - name: Build libdf.a (DeepFilterNet3, model embedded)
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        run: bash tui/build_deepfilter.sh

      - name: Build backend (linux, darwin, windows)
        working-directory: backend
        run: |
          VERSION="main-$(git rev-parse --short HEAD)"
          LDFLAGS="-X main.version=${VERSION}"
          mkdir -p ../dist
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../dist/roundtable-backend-linux-amd64 .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o ../dist/roundtable-backend-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o ../dist/roundtable-backend-windows-amd64.exe .
          echo "$VERSION" > ../dist/version.txt

      - name: Build TUI (linux/amd64)
        working-directory: tui
        run: |
          VERSION="main-$(git rev-parse --short HEAD)"
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o ../dist/roundtable-tui-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install opus
        run: brew install opus opusfile

      - name: Cache libdf.a
        id: cache-libdf
        uses: actions/cache@v4
        with:
          path: tui/internal/libdf.a
          key: libdf-macos-${{ hashFiles('tui/build_deepfilter.sh') }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.cache-libdf.outputs.cache-hit != 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        with:
          workspaces: tui/deep-filter-net/libDF -> target

      - name: Build libdf.a (DeepFilterNet3, model embedded)
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        run: bash tui/build_deepfilter.sh

      - name: Build TUI (darwin/arm64)
        working-directory: tui
        run: |
          VERSION="main-$(git rev-parse --short HEAD)"
          mkdir -p ../dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" -o ../dist/roundtable-tui-darwin-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Cache libdf.a
        id: cache-libdf
        uses: actions/cache@v4
        with:
          path: tui/internal/libdf.a
          key: libdf-windows-${{ hashFiles('tui/build_deepfilter.sh') }}

      # Use the GNU toolchain so the static libdf.a is compatible with Go's CGO (MinGW/gcc)
      - uses: dtolnay/rust-toolchain@stable
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        with:
          workspaces: tui/deep-filter-net/libDF -> target

      - name: Build libdf.a (DeepFilterNet3, model embedded)
        if: steps.cache-libdf.outputs.cache-hit != 'true'
        shell: bash
        env:
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
        run: bash tui/build_deepfilter.sh

      - name: Install opus (MinGW64)
        run: C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-x86_64-pkgconf mingw-w64-x86_64-opus mingw-w64-x86_64-opusfile"

      - name: Build TUI (windows/amd64)
        shell: bash
        working-directory: tui
        env:
          PKG_CONFIG: C:\msys64\mingw64\bin\pkg-config.exe
          PKG_CONFIG_PATH: C:\msys64\mingw64\lib\pkgconfig
          CGO_LDFLAGS: -LC:\msys64\mingw64\lib
        run: |
          VERSION="main-$(git rev-parse --short HEAD)"
          mkdir -p ../dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" -o ../dist/roundtable-tui-windows-amd64.exe .

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat dist/version.txt)
          gh release delete latest --yes || true
          gh release create latest \
            --title "latest ($VERSION)" \
            --notes "Built from commit $(git rev-parse --short HEAD)" \
            dist/roundtable-backend-linux-amd64 \
            dist/roundtable-backend-darwin-arm64 \
            dist/roundtable-backend-windows-amd64.exe \
            dist/roundtable-tui-linux-amd64 \
            dist/roundtable-tui-darwin-arm64 \
            dist/roundtable-tui-windows-amd64.exe
